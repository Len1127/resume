name: Manual Deployment

# 触发条件：手动触发 + 可选的输入参数
on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境（dev/prod）'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 根据输入参数选择部署环境
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ${{ github.event.inputs.environment }}
        run: |
          echo "开始部署到 ${{ github.event.inputs.environment }} 环境..."
          # 这里替换为实际的部署命令（比如上传到服务器、调用云服务 API 等）
